version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongodb:
    image: mongo:7.0
    container_name: fraud-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  fastapi-fraud:
    build: .
    container_name: fastapi-fraud
    depends_on:
      - mongodb
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      API_HOST: 0.0.0.0
      API_PORT: 8001
      MODEL_PATH: models/fraud_classifier.joblib
      OPTIMAL_THRESHOLD_PATH: models/optimal_threshold.txt
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001

  streamlit-fraud:
    build: .
    container_name: streamlit-fraud
    depends_on:
      - mongodb
      - fastapi-fraud
    ports:
      - "8502:8502"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      FASTAPI_SCORE_URL: http://fastapi-fraud:8001/score
      FASTAPI_HEALTH_URL: http://fastapi-fraud:8001/health
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8502

volumes:
  mongo_data:
